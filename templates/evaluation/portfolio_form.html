{% extends 'base.html' %}

{% block content %}
  <div class="max-w-xl">
    <form method="post" class="bg-white rounded-lg border border-slate-200 p-6 space-y-5">
      {% csrf_token %}
      {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-xs font-medium text-slate-600 mb-1">
            {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
          </label>
          {{ field }}
          {% if field.errors %}<div class="text-xs text-red-600 mt-1">{{ field.errors|striptags }}</div>{% endif %}
        </div>
      {% endfor %}
      <div class="flex items-center justify-end gap-2 pt-2 border-t border-slate-100">
        <a href="{% url 'evaluation:portfolio' %}" class="text-sm px-4 py-2 text-slate-600 hover:bg-slate-100 rounded">취소</a>
        <button type="submit" class="text-sm px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
          {% if mode == 'create' %}등록{% else %}저장{% endif %}
        </button>
      </div>
    </form>
  </div>
{% endblock %}
